<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Code Derby</title>
  <style>
    :root { --bg:#0f1419; --card:#151c23; --muted:#97a3ae; --fg:#e6edf3; --pri:#2f81f7; }
    @media (prefers-color-scheme: light) {
      :root { --bg:#fff; --card:#f6f8fa; --muted:#57606a; --fg:#24292f; --pri:#0969da; }
    }
    html,body{height:100%}
    body{margin:0;background:var(--bg);color:var(--fg);font:16px system-ui,-apple-system,Segoe UI,Roboto,Arial}
    .wrap{max-width:860px;margin:0 auto;padding:16px}
    .card{background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;margin-bottom:16px}
    h1{font-size:24px;margin:0 0 8px}
    .muted{color:var(--muted)}
    .row{display:flex;gap:8px}
    input{flex:1;padding:10px 12px;border-radius:10px;border:1px solid #2a2f36;background:transparent;color:var(--fg)}
    button{padding:10px 14px;border-radius:10px;border:1px solid #2a2f36;background:var(--pri);color:#fff;cursor:pointer}
    .list{display:flex;flex-direction:column;gap:6px}
    .item{display:flex;justify-content:space-between}
    code{font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Code Derby</h1>
      <div class="muted" id="meta">Loading…</div>
    </div>

    <div class="card">
      <h3>Your roster (3 GitHub repos)</h3>
      <div class="row">
        <input id="r1" placeholder="owner/repo" />
        <input id="r2" placeholder="owner/repo" />
        <input id="r3" placeholder="owner/repo" />
        <button id="save">Save</button>
      </div>
      <div class="muted" id="saved">—</div>
    </div>

    <div class="card">
      <h3>Leaderboard (stub)</h3>
      <div class="list" id="lb"></div>
      <div class="muted">Scores are placeholders for now; GitHub scoring can be enabled later.</div>
    </div>
  </div>

<script type="module">
const $ = (id) => document.getElementById(id);

async function boot(){
  try{
    const u = await (await fetch('/api/user')).json();
    $('meta').textContent = `Hello ${u.userName} • Week ${u.week} • ${u.today}`;
    await refresh();
  }catch(e){
    $('meta').textContent = 'Failed to load user info. ' + e;
  }
}

async function refresh(){
  try{
    const lb = await (await fetch('/api/leaderboard')).json();
    const box = $('lb'); box.innerHTML='';
    if(!lb.entries?.length){ box.innerHTML='<div class="muted">No entries yet.</div>'; }
    else{
      lb.entries.forEach((e, i)=>{
        const row = document.createElement('div'); row.className='item';
        row.innerHTML = `<div>${i+1}. u/${e.user}</div><div>${e.score} pts</div>`;
        box.appendChild(row);
      });
    }
  }catch(e){
    $('lb').innerHTML = '<div class="muted">Failed to load leaderboard.</div>';
  }
}

$('save').addEventListener('click', async ()=>{
  const repos = [ $('r1').value.trim(), $('r2').value.trim(), $('r3').value.trim() ]
    .filter(Boolean).slice(0,3);
  try{
    const r = await fetch('/api/roster/submit', {
      method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({repos})
    });
    const j = await r.json();
    $('saved').textContent = j.ok ? ('Saved: ' + repos.join('  •  ')) : 'Save failed';
    await refresh();
  }catch(e){
    $('saved').textContent = 'Save failed: ' + e;
  }
});

boot();
</script>
</body>
</html>
